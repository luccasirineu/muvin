<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <style>
    .fg-stroke { stroke: #1a1a1a; }
    .fg-fill   { fill:   #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      .fg-stroke { stroke: #f0f0f0; }
      .fg-fill   { fill:   #f0f0f0; }
    }
  </style>
  <rect class="fg-stroke" x="1" y="1" width="38" height="38" rx="3.5"
        fill="none" stroke-width="1.5"/>
  <text class="fg-fill" x="20" y="27"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-style="italic" text-anchor="middle">Mu</text>
</svg>
