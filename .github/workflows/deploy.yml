name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/muvin-frontend/package-lock.json

      - name: Install & Build Frontend
        working-directory: frontend/muvin-frontend
        run: |
          npm ci
          npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Backend
        working-directory: backend/muvinBackend
        run: dotnet build --configuration Release
  deploy:
    needs: validate
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DROPLET_PROJECT_PATH }}
            git pull origin main
            docker compose -f backend/muvinBackend/compose.yaml up --build -d
            docker image prune -f